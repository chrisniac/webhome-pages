      }

        };
      }

        Object.entries = function (obj) {
          return Object.keys(obj || {}).map(function (key) { return [key, obj[key]]; });
        };
      }
      if (!Array.from) {
        Array.from = function (value, mapFn, thisArg) {
          var result = [];
          if (value == null) return result;
          var iterator = typeof Symbol !== "undefined" && value[Symbol.iterator];

            var iter = iterator.call(value);
            while (!(step = iter.next()).done) {
              result.push(mapFn ? mapFn.call(thisArg, step.value, i++) : step.value);
            }
            return result;
          }
          var length = Number(value.length) || 0;
          for (; i < length; i++) {

          }

        };
      }
      if (window.NodeList && !NodeList.prototype.forEach) {
        NodeList.prototype.forEach = Array.prototype.forEach;
      }
      if (window.HTMLCollection && !HTMLCollection.prototype.forEach) {
        HTMLCollection.prototype.forEach = Array.prototype.forEach;
      }

        };
      }

                var nested = flatten(item, level + 1);
                for (var n = 0; n < nested.length; n++) acc.push(nested[n]);

          };
          return flatten(this, 0);
        };
      }
      if (!Array.prototype.flatMap) {
        Array.prototype.flatMap = function (callback, thisArg) {
          return this.map(callback, thisArg).flat();
        };
      }

        };
      }
      if (!String.prototype.endsWith) {

          });
        };
      }

        if (!document || !document.body || !document.documentElement) return;
        var root = document.documentElement;
        var flex = document.createElement("div");
        var grid = document.createElement("div");
        var makeChild = function () {
          var child = document.createElement("div");
          child.style.height = "1px";

        };

          flex.appendChild(makeChild());
          flex.appendChild(makeChild());
          grid.style.cssText = "position:absolute;left:-9999px;top:-9999px;display:grid;grid-template-columns:1px;gap:1px;visibility:hidden;";

          grid.appendChild(makeChild());

        }
        try {

            return;
          }

          return;
        }
        var measure = function () {
          if (!document.body) return;
          var box = document.createElement("div");
          try {
            box.style.cssText = "position:absolute;left:-9999px;top:-9999px;width:20px;aspect-ratio:2/1;visibility:hidden;";

         try { if (box.parentNode) box.parentNode.removeChild(box); } catch (e) {}
       };

       else measure();
     };

        if (!document || !document.documentElement) return;
        var root = document.documentElement;
        if (!window.CSS || !CSS.supports) {
          root.classList.add("no-backdrop-filter");
          return;
        }

          if (!CSS.supports("backdrop-filter", "blur(1px)")) {

          }
        } catch (e) {
          root.classList.add("no-backdrop-filter");
        }
      };
      if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", detectLayoutGap);
      else detectLayoutGap();
      detectCssFunctions();
      detectAspectRatio();
      detectBackdropFilter();
    })();
  </script>
  <style>
    :root {
      color-scheme: dark;
      --bg: transparent;
      --panel-rgb: 76, 88, 98;
      --panel: rgba(var(--panel-rgb), .58);
      --panel-soft: rgba(var(--panel-rgb), .44);
      --panel-strong: rgba(var(--panel-rgb), .82);
      --panel-2: rgba(var(--panel-rgb), .62);
      --text: #f4f7fb;
      --muted: rgba(226, 234, 242, .72);
      --line: rgba(255, 255, 255, .2);
      --line-strong: rgba(255, 255, 255, .34);
      --control: rgba(34, 43, 51, .42);
      --control-active: rgba(48, 61, 70, .58);
      --accent: rgba(245, 249, 252, .86);
      --accent-2: rgba(221, 232, 241, .66);
      --focus-line: rgba(168, 218, 255, .72);
      --focus-line-soft: rgba(168, 218, 255, .42);
      --focus-glow: rgba(96, 165, 250, .24);
      --focus-surface: rgba(255, 255, 255, .12);
      --ok: #9fd8ad;
      --danger: #f09d9d;
      --shadow: 0 16px 42px rgba(0, 0, 0, .24);
      --radius: 8px;
      --fm-web-height: 100vh;
      --fm-safe-top: 0px;
      --fm-safe-right: 0px;
      --fm-safe-bottom: 20px;
      --fm-safe-left: 0px;
      --safe-top: max(var(--fm-safe-top, 0px), env(safe-area-inset-top, 0px));
      --safe-right: max(var(--fm-safe-right, 0px), env(safe-area-inset-right, 0px));
      --safe-bottom: max(var(--fm-safe-bottom, 0px), env(safe-area-inset-bottom, 0px));
      --safe-left: max(var(--fm-safe-left, 0px), env(safe-area-inset-left, 0px));
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    @supports (height: 100dvh) {
      :root { --fm-web-height: 100dvh; }
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      max-width: 100%;
      min-height: var(--fm-web-height);
      background: transparent;
      color: var(--text);
      overflow-x: hidden;
    }

    html:not(.fm-native),
    html:not(.fm-native) body {
      background-color: #303840;
      background-image:
        linear-gradient(45deg, rgba(255, 255, 255, .07) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255, 255, 255, .07) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255, 255, 255, .07) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255, 255, 255, .07) 75%);
      background-position: 0 0, 0 16px, 16px -16px, -16px 0;
      background-size: 32px 32px;
    }

    html.fm-native,
    html.fm-native body {
      background: transparent;
    }

    body {
      overflow-x: hidden;
      letter-spacing: 0;
      position: relative;
      overscroll-behavior-x: none;
    }

    button, input, textarea, select {
      font: inherit;
      color: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      touch-action: manipulation;
      margin: 0;
      padding: 0;
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      text-align: inherit;
    }

    img {
      display: block;
      max-width: 100%;
      background: transparent;
    }

    .app {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      min-height: var(--fm-web-height);
      overflow-x: hidden;
      padding: max(12px, var(--safe-top)) 14px calc(18px + var(--safe-bottom));
      background: transparent;
    }

    body.detail-active .app {
      visibility: hidden;
      pointer-events: none;
    }

    body.detail-active .back-top {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    body.episode-active #detailSheet {
      visibility: hidden;
      pointer-events: none;
    }

    .mobile-detail-back {
      display: none;
      position: fixed;
      top: max(12px, var(--safe-top));
      left: 12px;
      z-index: 90;
      width: 42px;
      height: 42px;
      place-items: center;
      border-radius: 999px;
      color: rgba(255, 255, 255, .92);
      background: rgba(12, 18, 24, .18);
      border: 1px solid rgba(255, 255, 255, .16);
      box-shadow: 0 8px 22px rgba(0, 0, 0, .18);
      backdrop-filter: blur(8px) saturate(1.05);
      transition: opacity .16s ease, visibility .16s ease, transform .16s ease;
    }

    .mobile-detail-back .icon {
      width: 21px;
      height: 21px;
    }

    .mobile-detail-back:focus {
      z-index: 95;
      background: rgba(16, 24, 32, .34);
    }

    .mobile-detail-back.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(-8px);
    }

    html.native-phone-app body.detail-active .mobile-detail-back,
    html.native-phone-app body.episode-active .image-viewer .mobile-detail-back {
      display: grid;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background: var(--control);
      border: 1px solid var(--line);
      color: var(--text);
      text-shadow: 0 1px 2px rgba(0, 0, 0, .38);
      backdrop-filter: blur(12px) saturate(1.05);
    }

    .icon {
      width: 19px;
      height: 19px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .pill {
      width: fit-content;
      color: var(--text);
      background: var(--control-active);
      border: 1px solid var(--line);
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      text-shadow: 0 1px 2px rgba(0, 0, 0, .38);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 14px;
      border-radius: var(--radius);
      background: var(--control);
      border: 1px solid var(--line);
      color: var(--text);
      font-weight: 760;
      text-decoration: none;
      text-shadow: 0 1px 2px rgba(0, 0, 0, .38);
      backdrop-filter: blur(12px) saturate(1.05);
    }

    .btn.primary {
      color: var(--text);
      background: var(--control-active);
      border-color: var(--line-strong);
    }

    .btn.blue {
      background: var(--control-active);
      color: var(--text);
      border-color: var(--line-strong);
    }

    .btn.danger {
      color: #fff0f0;
      background: rgba(240, 157, 157, .2);
      border-color: rgba(255, 220, 220, .24);
    }

    .btn.link {
      min-height: 30px;
      padding: 0;
      border: 0;
      background: transparent;
      color: rgba(184, 226, 255, .92);
      font-size: 13px;
      font-weight: 760;
      text-shadow: 0 1px 2px rgba(0, 0, 0, .38);
      backdrop-filter: none;
    }

    .search {
      width: 100%;
      min-width: 0;
      display: flex;
      align-items: stretch;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 10px;
      margin: 14px 0 8px;
      position: relative;
      z-index: 20;
    }

    .search .field {
      flex: 1 1 auto;
      min-width: 0;
    }

    .search .btn,
    .search .icon-btn {
      flex: 0 0 auto;
      margin-left: 10px;
    }

    .search .icon-btn {
      width: 44px;
      height: auto;
      min-height: 44px;
      align-self: stretch;
    }

    @supports (display: grid) {
      .search .btn,
      .search .icon-btn { margin-left: 0; }
    }

    .search.suggesting {
      z-index: 95;
    }

    html.tv-mode .search {
      grid-template-columns: minmax(0, 1fr) auto auto auto;
      align-items: stretch;
    }

    html.tv-mode .search > .connection-dock {
      align-self: stretch;
      margin-left: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
    }

    html.tv-mode .search > .connection-dock .connection-toggle {
      min-height: 44px;
      height: 100%;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--control);
    }

    html.tv-mode .search > .connection-dock .connection-toggle:focus {
      transform: translateY(-1px);
      background: rgba(70, 85, 96, .72);
      border-color: var(--focus-line);
      box-shadow: none;
    }

    .suggest-panel {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 8px);
      z-index: 1;
      display: none;
      max-height: 460px;
      max-height: 54vh;
      max-height: min(54vh, 460px);
      overflow-y: auto;
      padding: 6px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: rgba(22, 28, 34, .94);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px) saturate(1.08);
      scrollbar-width: none;
    }

    .suggest-panel.open { display: block; display: grid; gap: 6px; }
    .suggest-panel::-webkit-scrollbar { display: none; }

    .suggest-item {
      min-width: 0;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      min-height: 42px;
      padding: 8px 10px;
      border-radius: var(--radius);
      color: var(--text);
      text-align: left;
      background: rgba(42, 52, 60, .56);
      border: 1px solid rgba(255, 255, 255, .12);
    }

    .suggest-item b {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      line-height: 1.25;
    }

    .suggest-item span {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .field {
      width: 100%;
      min-height: 44px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--control);
      color: var(--text);
      padding: 0 12px;
      outline: none;
      text-shadow: 0 1px 2px rgba(0, 0, 0, .35);
      backdrop-filter: blur(12px) saturate(1.05);
    }

    textarea.field {
      min-height: 74px;
      padding: 10px 12px;
      resize: vertical;
    }

    .field::placeholder { color: rgba(226, 234, 242, .5); }

    .chips {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 3px 0 2px;
      overscroll-behavior-x: contain;
    }

    .chips::-webkit-scrollbar,
    .rail::-webkit-scrollbar { display: none; }

    .chip {
      flex: 0 0 auto;
      min-height: 36px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--control);
      border: 1px solid var(--line);
      color: var(--text);
      font-weight: 700;
      font-size: 13px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, .38);
      backdrop-filter: blur(12px) saturate(1.05);
    }

    .chip.active {
      background: var(--control-active);
      color: var(--text);
      border-color: var(--line-strong);
    }

    .section {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      margin-top: 24px;
      overflow: hidden;
    }

    #recommendSection {
      overflow: visible;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      position: relative;
      overflow: visible;
    }

    .section h3 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .section small {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .section-actions {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .mini-icon-btn {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background: var(--control);
      border: 1px solid var(--line);
      color: var(--text);
      backdrop-filter: blur(12px) saturate(1.05);
    }

    .mini-icon-btn .icon {
      width: 16px;
      height: 16px;
    }

    .stack {
      display: block;
      gap: 18px;
      min-width: 0;
    }

    .list-block {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      overflow: hidden;
      margin-top: 18px;
    }

    .list-block:first-child {
      margin-top: 0;
    }

    html.tv-mode .list-block {
      overflow: visible;
    }

    .subsection-head {
      min-width: 0;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 9px;
    }

    .subsection-head h4 {
      margin: 0;
      font-size: 15px;
      line-height: 1.2;
    }

    .subsection-head span {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .rail {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      display: flex;
      gap: 12px;
      overflow-x: auto;
      overflow-y: hidden;
      overscroll-behavior-x: contain;
      scroll-snap-type: none;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      touch-action: pan-x pan-y;
      padding: 2px 0 5px;
    }

    html.tv-mode .rail {
      overflow-y: visible;
      padding: 10px 5px 14px;
    }

    .media-grid {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    html.tv-mode .media-grid {
      overflow: visible;
      padding: 10px 5px 14px;
    }

    .list-panel[hidden] {
      display: none !important;
    }

    .infinite-sentinel {
      width: 100%;
      height: 1px;
      pointer-events: none;
      overflow-anchor: none;
    }

    .card {
      flex: 0 0 142px;
      min-width: 0;
      max-width: 172px;
      position: relative;
      border-radius: var(--radius);
      background: var(--panel-soft);
      border: 1px solid var(--line);
      overflow: hidden;
      padding: 0;
      text-align: left;
      color: var(--text);
      scroll-snap-align: start;
      backdrop-filter: blur(10px) saturate(1.05);
    }

    .media-grid .card {
      width: 100%;
      max-width: none;

<body>
  <main class="app" id="home">
    <form class="search" id="searchForm" autocomplete="off">
      <input class="field focusable" id="searchInput" type="search" inputmode="search" enterkeyhint="search" placeholder="搜索关键词" aria-autocomplete="list" aria-controls="suggestPanel" readonly>

      <button class="icon-btn focusable" id="homeSettingBtn" type="button" aria-label="设置" title="设置">

      </button>
      <div class="suggest-panel" id="suggestPanel" role="listbox"></div>
    </form>

    <nav class="chips" id="chips"></nav>

    <section class="section" id="searchSection" style="display:none">

    </section>

        <h3>Nostr推荐</h3>

            <span class="connection-title">状态</span>
            <span class="connection-arrow">⌃</span>
          </button>
          <div class="connection-body" id="connectionBody" aria-hidden="true">
            <div class="connection-grid">
              <div class="connection-item"><b>App SDK</b><span id="statusSdk">检测中</span></div>
              <div class="connection-item"><b>TMDB</b><span id="statusTmdb">等待请求</span></div>
              <div class="connection-item"><b>Nostr</b><span id="statusNostr">等待连接</span></div>
              <div class="connection-item"><b>盘搜</b><span id="statusPan">未搜索</span></div>
              <div class="connection-item"><b>发布</b><span id="statusPublish">暂无发布</span></div>
              <div class="connection-item"><b>身份</b><span class="mono" id="statusIdentity">未就绪</span></div>
              <div class="connection-item refresh-progress"><b>刷新</b><span id="statusRefresh">未执行</span></div>
              <div class="connection-item"><b>Relays</b><span id="statusRelays">未连接</span></div>
              <div class="connection-item"><b>分级限制</b><div class="detail-style-segmented" id="ratingLimitSegmented" role="group" aria-label="分级限制">
                <button class="detail-style-option focusable" id="ratingLimitOnBtn" type="button" data-rating-limit="on">开启</button>
                <button class="detail-style-option focusable" id="ratingLimitOffBtn" type="button" data-rating-limit="off">关闭</button>
              </div></div>
              <div class="connection-item"><b>首页全屏</b><div class="detail-style-segmented" id="homeFullscreenSegmented" role="group" aria-label="首页全屏">
                <button class="detail-style-option focusable" id="homeFullscreenOnBtn" type="button" data-home-fullscreen="on">开启</button>
                <button class="detail-style-option focusable" id="homeFullscreenOffBtn" type="button" data-home-fullscreen="off">关闭</button>
              </div></div>
              <div class="connection-item"><b>手机详情</b><div class="detail-style-segmented" id="mobileDetailStyleSegmented" role="group" aria-label="手机详情样式">
                <button class="detail-style-option focusable" id="mobileDetailImmersiveBtn" type="button" data-mobile-detail-style="immersive">沉浸式</button>
                <button class="detail-style-option focusable" id="mobileDetailTranslucentBtn" type="button" data-mobile-detail-style="translucent">半透明</button>
              </div></div>
            </div>
            <div class="pan-config">
              <label for="tmdbKeyInput">TMDB Key
                <input class="field focusable mono" id="tmdbKeyInput" type="password" inputmode="text" autocomplete="off" placeholder="TMDB API Key" readonly>
              </label>
              <label for="panBaseInput">盘搜地址
                <input class="field focusable" id="panBaseInput" type="url" inputmode="url" placeholder="https://so.252035.xyz" readonly>
              </label>
              <label for="panChannelsInput">TG频道
                <textarea class="field focusable" id="panChannelsInput" rows="2" placeholder="可选，多个频道用逗号或换行分隔" readonly></textarea>
              </label>
              <label for="panUserInput">账号
                <input class="field focusable" id="panUserInput" type="text" autocomplete="username" placeholder="未启用认证可留空" readonly>
              </label>
              <label for="panPassInput">密码
                <input class="field focusable" id="panPassInput" type="password" autocomplete="current-password" placeholder="未启用认证可留空" readonly>
              </label>
              <div class="pan-disk-grid" id="panDiskGrid"></div>
              <button class="btn focusable" id="savePanConfigBtn" type="button">保存配置</button>
            </div>
            <div class="relay-mirror-config">

              </label>
              <label for="mirrorTargetInput">镜像目标 Relays

              <button class="btn focusable" id="mirrorRelayBtn" type="button">镜像榜单</button>

            <div class="actions" style="margin-top:10px">
              <button class="btn focusable" id="refreshNostrBtn" type="button">刷新榜单</button>
              <button class="btn focusable" id="syncBtn" type="button">同步身份</button>
              <button class="btn danger focusable" id="deleteDataBtn" type="button">删除数据</button>
            </div>

      <div class="media-grid" id="recommendRail"></div>
